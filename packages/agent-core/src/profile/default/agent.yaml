name: agent
description: Default Scream Code agent

systemPromptPath: ./system.md
promptVars:
  roleAdditional: ''

tools:
  - Read
  - Write
  - Edit
  - Grep
  - Glob
  - Bash
  - TaskList
  - TaskOutput
  - TaskStop
  - CronCreate
  - CronList
  - CronDelete
  - ReadMediaFile
  - TodoList
  - Skill
  - WebSearch
  - Agent
  - FetchURL
  - AskUserQuestion
  - EnterPlanMode
  - ExitPlanMode
  - mcp__*

subagents:
  coder:
    description: Good at general software engineering tasks.
  explore:
    description: Fast codebase exploration with prompt-enforced read-only behavior.
  plan:
    description: Read-only implementation planning and architecture design.
  writer:
    description: Content production and research specialist. Produces structured, data-driven reports, analyses, and Markdown documents.
