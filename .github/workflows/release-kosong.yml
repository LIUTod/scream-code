name: Release (ltod)

on:
  push:
    tags:
      - "ltod-*"

permissions:
  contents: read

jobs:
  validate:
    name: Validate tag
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          allow-prereleases: true

      - name: Check version tag
        run: |
          python scripts/check_version_tag.py \
            --pyproject packages/ltod/pyproject.toml \
            --expected-version "${GITHUB_REF_NAME#ltod-}"

  publish:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          allow-prereleases: true

      - name: Set up uv
        uses: astral-sh/setup-uv@v1
        with:
          version: "0.8.5"

      - name: Build distributions
        run: make build-ltod

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
          packages-dir: dist/ltod

  docs:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          allow-prereleases: true

      - name: Set up uv
        uses: astral-sh/setup-uv@v1
        with:
          version: "0.8.5"

      - name: Install dependencies
        run: uv sync --frozen --all-extras --project packages/ltod

      - name: Generate API documentation
        run: |
          VERSION="${GITHUB_REF_NAME#ltod-}"
          uv run --project packages/ltod pdoc ltod \
            --docformat google \
            --footer-text "ltod ${VERSION}" \
            -o packages/ltod/docs

      - name: Disable Jekyll processing
        run: touch packages/ltod/docs/.nojekyll

      - name: Publish docs to gh-pages
        env:
          KOSONG_PAGES_TOKEN: ${{ secrets.KOSONG_PAGES_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#ltod-}"
          PAGES_REPO="https://x-access-token:${KOSONG_PAGES_TOKEN}@github.com/MoonshotAI/ltod.git"
          PAGES_DIR="${RUNNER_TEMP}/ltod-gh-pages"

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          rm -rf "$PAGES_DIR"
          git clone --depth 1 --branch gh-pages "$PAGES_REPO" "$PAGES_DIR"
          rsync -a --delete --exclude '.git' "packages/ltod/docs/" "$PAGES_DIR/"

          git -C "$PAGES_DIR" add -A
          if git -C "$PAGES_DIR" diff --cached --quiet; then
            echo "No documentation changes to publish."
            exit 0
          fi

          git -C "$PAGES_DIR" commit -m "docs: update for ${VERSION}"
          git -C "$PAGES_DIR" push origin gh-pages
